server:
  port: 60101
  
spring:
  application:
    name: ginkgo-id-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gk_id?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&connectTimeout=3000&socketTimeout=5000
    username: temp
    password: "123"
    # HikariCP连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: IdMetaHikariPool
  data:
    redis:
      host: 127.0.0.1
      port: 6379
#      password: "123"
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.aurifolia.cloud.id.metaserver.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Dubbo配置
dubbo:
  registry:
    address: nacos://${nacos.address:127.0.0.1}:8848?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50051
  application:
    name: ${spring.application.name}
    logger: slf4j
  consumer:
    check: false
    timeout: 3000
    retries: 0

# ID元数据服务自定义配置
id:
  meta:
    max-retries: 3
    retry-delay-ms: 5
    lock-wait-time-ms: 2000
    lock-lease-time-seconds: 3
    default-step: 1000

# 日志配置
logging:
  level:
    root: INFO
    org.aurifolia.cloud.id.metaserver: DEBUG
    org.aurifolia.cloud.id.metaserver.mapper: DEBUG
    org.apache.dubbo: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30